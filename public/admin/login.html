<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – School Result Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(0,100,0,0.25) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(0,64,0,0.2) 0%, transparent 60%);
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo-wrap {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #006400, #00a550);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 0 30px rgba(0,100,0,0.5);
    }

    .brand-logo-wrap svg { width: 36px; height: 36px; }

    .login-brand h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .login-brand p {
      color: #94a3b8;
      font-size: 0.82rem;
      margin-top: 0.25rem;
    }

    .login-card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .login-card h2 {
      color: #f1f5f9;
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .login-card .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 0.45rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      background: #0f172a;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: #00a550;
      box-shadow: 0 0 0 3px rgba(0,165,80,0.15);
    }

    .input-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      pointer-events: none;
    }

    .input-wrap input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px #0f172a inset;
      -webkit-text-fill-color: #f1f5f9;
    }

    .eye-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
    }

    .eye-btn:hover { color: #94a3b8; }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #006400, #00a550);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .divider {
      text-align: center;
      color: #334155;
      font-size: 0.8rem;
      margin: 1.5rem 0 0;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: #64748b;
      font-size: 0.82rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="login-wrapper">
    <div class="login-brand">
      <div class="brand-logo-wrap">
        <svg viewBox="0 0 36 36" fill="none">
          <path d="M18 3L33 12V24L18 33L3 24V12L18 3Z" fill="rgba(255,255,255,0.15)" stroke="#FFD700" stroke-width="1.5"/>
          <path d="M12 18h12M18 12v12" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>SCHOOL RESULT PORTAL</h1>
      <p>Administrator Access Panel</p>
    </div>

    <div class="login-card">
      <h2>Sign In</h2>
      <p class="subtitle">Enter your credentials to access the dashboard</p>

      <div class="error-box" id="error-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span id="error-text"></span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
            </span>
            <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2"/></svg>
            </span>
            <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password" id="pwd">
            <button type="button" class="eye-btn" id="pwd-toggle">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" style="display:none"><span class="spinner"></span></span>
        </button>
      </form>

      <div class="divider">
        <a href="/" class="back-link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Back to Student Portal
        </a>
      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('pwd-toggle').addEventListener('click', function() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');

      errorBox.style.display = 'none';
      btn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'flex';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/admin/dashboard';
        } else {
          document.getElementById('error-text').textContent = data.message || 'Login failed.';
          errorBox.style.display = 'flex';
        }
      } catch (err) {
        document.getElementById('error-text').textContent = 'Connection error. Please try again.';
        errorBox.style.display = 'flex';
      } finally {
        btn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
